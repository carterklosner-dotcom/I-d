<!DOCTYPE html>
<html>
<head>
  <title>Underground Drop</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
    }

    #lobby {
      position: absolute;
      width: 100%;
      height: 100%;
      background: white;
      color: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #lobbyScene {
      position: relative;
      width: 220px;
      height: 160px;
      margin-bottom: 20px;
    }

    #platform {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 18px;
      background: #444;
      border-radius: 8px;
    }

    #lobbyPlayer {
      position: absolute;
      bottom: 58px;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 35px;
      background: dodgerblue;
      border-radius: 4px;
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
    }

    #timer {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 30px;
      z-index: 5;
    }

    #joystickBase {
      position: absolute;
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      bottom: 30px;
      left: 30px;
      z-index: 20;
      touch-action: none;
      display: none;
    }

    #joystickStick {
      position: absolute;
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      left: 30px;
      top: 30px;
    }
  </style>
</head>

<body>

<div id="lobby">
  <div id="lobbyScene">
    <div id="platform"></div>
    <div id="lobbyPlayer"></div>
  </div>

  <h1>UNDERGROUND DROP</h1>
  <button onclick="startGame()">READY UP</button>
</div>

<div id="timer"></div>

<div id="joystickBase">
  <div id="joystickStick"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

//////////////////////////////////////////////////////
// DEVICE LOCK
//////////////////////////////////////////////////////
if (!(/iPhone|iPod/.test(navigator.userAgent) &&
      location.hostname.includes("github.io"))) {
  document.body.innerHTML = "<h2 style='text-align:center;margin-top:40vh;font-family:Arial'>iPhone + GitHub only</h2>";
  throw new Error();
}

//////////////////////////////////////////////////////
// CORE VARS
//////////////////////////////////////////////////////
let scene, camera, renderer, player;
let moveF = 0, moveS = 0;
let rot = 0, pitch = 0;
let lx = 0, ly = 0;

//////////////////////////////////////////////////////
// INIT GAME
//////////////////////////////////////////////////////
function initGame() {

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x2b2b2b);
  scene.fog = new THREE.Fog(0x6ea7ff, 15, 80);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0, 5, 10);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const sun = new THREE.DirectionalLight(0xffffff, 1.2);
  sun.position.set(20,30,10);
  scene.add(sun);

  // ground
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(80,80),
    new THREE.MeshStandardMaterial({ color: 0x5c4033 })
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // walls (compressed loop)
  const wallGeo = [
    [2,12,80, -40,5,0],
    [2,12,80,  40,5,0],
    [80,12,2,  0,5,-40],
    [80,12,2,  0,5,40],
    [80,2,80,  0,10,0]
  ];

  const mat = new THREE.MeshStandardMaterial({ color: 0x5c4033 });

  wallGeo.forEach(w => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w[0],w[1],w[2]), mat);
    m.position.set(w[3],w[4],w[5]);
    scene.add(m);
  });

  // simplified player
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({ color: 0x222222 })
  );

  player.position.y = 1;
  scene.add(player);
}

//////////////////////////////////////////////////////
// START
//////////////////////////////////////////////////////
function startGame() {

  lobby.style.display = "none";
  joystickBase.style.display = "block";

  initGame();
  timerStart();

  const base = joystickBase, stick = joystickStick;
  let drag = false;

  base.ontouchstart = () => drag = true;

  window.ontouchend = () => {
    drag = false;
    moveF = moveS = lx = ly = 0;
    stick.style.left = "30px";
    stick.style.top = "30px";
  };

  window.ontouchmove = e => {
    const t = e.touches[0];

    if (drag && t.clientX < innerWidth/2) {
      const r = base.getBoundingClientRect();
      let x = t.clientX - r.left - 60;
      let y = t.clientY - r.top - 60;

      x = Math.max(-30, Math.min(30, x));
      y = Math.max(-30, Math.min(30, y));

      stick.style.left = x+30+"px";
      stick.style.top = y+30+"px";

      moveS = x * 0.01;
      moveF = y * 0.01;
    }

    if (t.clientX > innerWidth/2) {
      if (lx) {
        rot -= (t.clientX - lx) * 0.01;
        pitch -= (t.clientY - ly) * 0.03;
        pitch = Math.max(-2, Math.min(4, pitch));
      }
      lx = t.clientX;
      ly = t.clientY;
    }
  };

  animate();
}

//////////////////////////////////////////////////////
// TIMER
//////////////////////////////////////////////////////
function timerStart() {
  let t = 10;
  timer.innerHTML = t;

  let i = setInterval(() => {
    timer.innerHTML = --t || "DROP!";
    if (!t) clearInterval(i);
  }, 1000);
}

//////////////////////////////////////////////////////
// LOOP
//////////////////////////////////////////////////////
function animate() {

  requestAnimationFrame(animate);

  if (!player) return;

  const sp = 0.15;

  player.position.x += Math.sin(rot) * -moveF * sp;
  player.position.z += Math.cos(rot) * -moveF * sp;

  player.position.x += Math.cos(rot) * moveS * sp;
  player.position.z += Math.sin(rot) * moveS * sp;

  const d = 8;

  camera.position.x = player.position.x + Math.sin(rot)*d;
  camera.position.z = player.position.z + Math.cos(rot)*d;
  camera.position.y = player.position.y + 4 + pitch;

  camera.lookAt(player.position);
  renderer.render(scene, camera);
}

</script>
</body>
</html>
