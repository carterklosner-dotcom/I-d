<!DOCTYPE html>
<html>
<head>
  <title>Drop Game</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    #lobby {
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    #ui {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 24px;
    }
    button {
      font-size: 20px;
      padding: 10px 20px;
    }
  </style>
</head>
<body>

<div id="lobby">
  <h1>UNDERGROUND DROP</h1>
  <button onclick="startGame()">READY UP</button>
</div>

<div id="ui"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer, player;
let started = false;
let countdown = 10;

function initGame() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // ground
  let groundGeo = new THREE.BoxGeometry(50, 1, 50);
  let groundMat = new THREE.MeshBasicMaterial({ color: 0x228B22 });
  let ground = new THREE.Mesh(groundGeo, groundMat);
  ground.position.y = -2;
  scene.add(ground);

  // player
  let geo = new THREE.BoxGeometry(1,1,1);
  let mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  player = new THREE.Mesh(geo, mat);
  player.position.y = 2;
  scene.add(player);

  camera.position.set(0, 3, 5);
}

function startGame() {
  document.getElementById("lobby").style.display = "none";
  initGame();
  started = true;
  countdownTimer();
  animate();
}

function countdownTimer() {
  let ui = document.getElementById("ui");

  let interval = setInterval(() => {
    ui.innerHTML = "Starting in: " + countdown;
    countdown--;

    if (countdown < 0) {
      clearInterval(interval);
      ui.innerHTML = "DROP!";
    }
  }, 1000);
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
</script>

</body>
</html>
