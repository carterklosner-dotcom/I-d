<!DOCTYPE html>
<html>
<head>
  <title>Drop Game</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    #lobby {
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    #ui {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 24px;
    }
    button {
      font-size: 20px;
      padding: 10px 20px;
    }
  </style>
</head>
<body>

<div id="lobby">
  <h1>UNDERGROUND DROP</h1>
  <button onclick="startGame()">READY UP</button>
</div>

<div id="ui"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer, player;
let started = false;
let countdown = 10;

function initGame() {
  scene = new THREE.Scene();
  scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87ceeb, 10, 60);

// 👇 paste lighting here
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 1);
sunLight.position.set(10, 20, 10);
scene.add(sunLight);

  camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // ground
 const groundGeo = new THREE.PlaneGeometry(200, 200);
const groundMat = new THREE.MeshStandardMaterial({ 
  color: 0x3b7a3b,
  roughness: 1
});

const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
scene.add(ground);

  // player
player = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.5, 1, 4, 8),
  new THREE.MeshStandardMaterial({ color: 0xffffff })
);

player.position.y = 1;
scene.add(player);
  player = new THREE.Mesh(geo, mat);
  player.position.y = 2;
  scene.add(player);

  camera.position.set(0, 3, 5);
}

function startGame() {
  document.getElementById("lobby").style.display = "none";
  initGame();
  started = true;
  countdownTimer();
  animate();
}

function countdownTimer() {
  let ui = document.getElementById("ui");

  let interval = setInterval(() => {
    ui.innerHTML = "Starting in: " + countdown;
    countdown--;

    if (countdown < 0) {
      clearInterval(interval);
      ui.innerHTML = "DROP!";
    }
  }, 1000);
}

function animate() {
  requestAnimationFrame(animate);
  camera.position.x += (player.position.x - camera.position.x) * 0.1;
camera.position.y += (player.position.y + 3 - camera.position.y) * 0.1;
camera.position.z += (player.position.z + 6 - camera.position.z) * 0.1;

camera.lookAt(player.position);
}
</script>

</body>
</html>
