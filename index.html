<!DOCTYPE html>
<html>
<head>
  <title>Underground Drop</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
    }

    #lobby {
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      color: white;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      z-index: 10;
    }

    #timer {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 30px;
      z-index: 5;
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div id="lobby">
  <h1>UNDERGROUND DROP</h1>

  <button onclick="startGame()">
    READY UP
  </button>
</div>

<div id="timer"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

let scene;
let camera;
let renderer;
let player;

function initGame() {

  // Scene
  scene = new THREE.Scene();

  scene.background =
    new THREE.Color(0x6ea7ff);

  scene.fog =
    new THREE.Fog(
      0x6ea7ff,
      15,
      80
    );

  // Camera
  camera =
    new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

  camera.position.set(0, 5, 10);

  // Renderer
  renderer =
    new THREE.WebGLRenderer({
      antialias: true
    });

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );

  document.body.appendChild(
    renderer.domElement
  );

  // Lights
  const ambientLight =
    new THREE.AmbientLight(
      0xffffff,
      0.7
    );

  scene.add(ambientLight);

  const sunLight =
    new THREE.DirectionalLight(
      0xffffff,
      1.2
    );

  sunLight.position.set(20, 30, 10);

  scene.add(sunLight);

  // Ground
  const groundGeometry =
    new THREE.PlaneGeometry(80, 80);

  const groundMaterial =
    new THREE.MeshStandardMaterial({
      color: 0x3f8f3f
    });

  const ground =
    new THREE.Mesh(
      groundGeometry,
      groundMaterial
    );

  ground.rotation.x =
    -Math.PI / 2;

  scene.add(ground);

  // Player
  const geometry =
    new THREE.BoxGeometry(
      1,
      2,
      1
    );

  const material =
    new THREE.MeshStandardMaterial({
      color: 0xffffff
    });

  player =
    new THREE.Mesh(
      geometry,
      material
    );

  player.position.y = 1;

  scene.add(player);
}

function startGame() {

  document.getElementById(
    "lobby"
  ).style.display = "none";

  initGame();

  startCountdown();

  animate();
}

function startCountdown() {

  let time = 10;

  const timer =
    document.getElementById(
      "timer"
    );

  timer.innerHTML = time;

  const interval =
    setInterval(() => {

      time--;

      timer.innerHTML = time;

      if (time <= 0) {

        clearInterval(interval);

        timer.innerHTML =
          "DROP!";
      }

    }, 1000);
}

function animate() {

  requestAnimationFrame(
    animate
  );

  renderer.render(
    scene,
    camera
  );
}

</script>

</body>
</html>
