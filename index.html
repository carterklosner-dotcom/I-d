<!DOCTYPE html>
<html>
<head>
  <title>Underground Drop</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
    }

    #lobby {
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      color: white;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      z-index: 10;
    }

    #timer {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 30px;
      z-index: 5;
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div id="lobby">
  <h1>UNDERGROUND DROP</h1>

  <button onclick="startGame()">
    READY UP
  </button>
</div>

<div id="timer"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

let scene;
let camera;
let renderer;
let player;

function initGame() {

  // Scene
  scene = new THREE.Scene();

 scene.background =
  new THREE.Color(0x2b2b2b);

  scene.fog =
    new THREE.Fog(
      0x6ea7ff,
      15,
      80
    );

  // Camera
  camera =
    new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

  camera.position.set(0, 5, 10);

  // Renderer
  renderer =
    new THREE.WebGLRenderer({
      antialias: true
    });

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );

  document.body.appendChild(
    renderer.domElement
  );

  // Lights
  const ambientLight =
    new THREE.AmbientLight(
      0xffffff,
      0.7
    );

  scene.add(ambientLight);

  const sunLight =
    new THREE.DirectionalLight(
      0xffffff,
      1.2
    );

  sunLight.position.set(20, 30, 10);

  scene.add(sunLight);

  // Ground
  const groundGeometry =
    new THREE.PlaneGeometry(80, 80);

  const groundMaterial =
    new THREE.MeshStandardMaterial({
  color: 0x5c4033
    });

  const ground =
    new THREE.Mesh(
      groundGeometry,
      groundMaterial
    );

  ground.rotation.x =
    -Math.PI / 2;

  scene.add(ground);
// ROOM MATERIAL
const dirtMaterial =
  new THREE.MeshStandardMaterial({
    color: 0x5c4033
  });

// LEFT WALL
const leftWall =
  new THREE.Mesh(
    new THREE.BoxGeometry(2, 12, 80),
    dirtMaterial
  );

leftWall.position.set(-40, 5, 0);

scene.add(leftWall);

// RIGHT WALL
const rightWall =
  new THREE.Mesh(
    new THREE.BoxGeometry(2, 12, 80),
    dirtMaterial
  );

rightWall.position.set(40, 5, 0);

scene.add(rightWall);

// BACK WALL
const backWall =
  new THREE.Mesh(
    new THREE.BoxGeometry(80, 12, 2),
    dirtMaterial
  );

backWall.position.set(0, 5, -40);

scene.add(backWall);

// FRONT WALL
const frontWall =
  new THREE.Mesh(
    new THREE.BoxGeometry(80, 12, 2),
    dirtMaterial
  );

frontWall.position.set(0, 5, 40);

scene.add(frontWall);

// CEILING
const ceiling =
  new THREE.Mesh(
    new THREE.BoxGeometry(80, 2, 80),
    dirtMaterial
  );

ceiling.position.set(0, 10, 0);

scene.add(ceiling);
  // Player
  // PLAYER GROUP
player = new THREE.Group();

// BODY
const body =
  new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 2, 0.8),
    new THREE.MeshStandardMaterial({
      color: 0x222222
    })
  );

body.position.y = 2;

player.add(body);

// HEAD
const head =
  new THREE.Mesh(
    new THREE.BoxGeometry(0.9, 0.9, 0.9),
    new THREE.MeshStandardMaterial({
      color: 0xffd6b3
    })
  );

head.position.y = 3.5;

player.add(head);

// LEFT ARM
const leftArm =
  new THREE.Mesh(
    new THREE.BoxGeometry(0.4, 1.5, 0.4),
    new THREE.MeshStandardMaterial({
      color: 0x222222
    })
  );

leftArm.position.set(-0.9, 2, 0);

player.add(leftArm);

// RIGHT ARM
const rightArm =
  new THREE.Mesh(
    new THREE.BoxGeometry(0.4, 1.5, 0.4),
    new THREE.MeshStandardMaterial({
      color: 0x222222
    })
  );

rightArm.position.set(0.9, 2, 0);

player.add(rightArm);

// LEFT LEG
const leftLeg =
  new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 1.5, 0.5),
    new THREE.MeshStandardMaterial({
      color: 0x111111
    })
  );

leftLeg.position.set(-0.3, 0.7, 0);

player.add(leftLeg);

// RIGHT LEG
const rightLeg =
  new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 1.5, 0.5),
    new THREE.MeshStandardMaterial({
      color: 0x111111
    })
  );

rightLeg.position.set(0.3, 0.7, 0);

player.add(rightLeg);

// PLAYER POSITION
player.position.y = 0;

scene.add(player);
}

function startGame() {

  document.getElementById(
    "lobby"
  ).style.display = "none";

  initGame();

  startCountdown();

  animate();
}

function startCountdown() {

  let time = 10;

  const timer =
    document.getElementById(
      "timer"
    );

  timer.innerHTML = time;

  const interval =
    setInterval(() => {

      time--;

      timer.innerHTML = time;

      if (time <= 0) {

        clearInterval(interval);

        timer.innerHTML =
          "DROP!";
      }

    }, 1000);
}

function animate() {

  requestAnimationFrame(
    animate
  );

  renderer.render(
    scene,
    camera
  );
}

</script>

</body>
</html>
